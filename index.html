<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist</title>
    <!-- css -->
    <link rel="stylesheet" href="index.css">
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Find your film</h1>
        <a href="myWatchlist.html">My Watchlist</a>
    </header>
    <main>
        <section id="movies-list" class="movies-list">
            <section class="placeholder-container" id="placeholder-container">
                <img src="/images/film.png" class="film-placeholder-img" alt="film placeholder" />
                <p>Start exploring</p>
            </section>
        </section>
    </main>
    <section class="search-section">
        <form id="search-form" class="search-form">
            <img src="/images/search.png" class="search-icon" alt="search icon">
            <input type="text" 
            id="search-input" 
            class="search-input" 
            placeholder="Search for a movie">
            <button type="submit" id="search-btn" class="search-btn">Search</button>
        </form>
    </section>
   
    <script src="index.js"></script>
</body>
</html>
